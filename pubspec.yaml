name: check2b_mobile_app
description: "Aplicativo móvel para a plataforma Check2B."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.2.0
  firebase_messaging: ^15.0.1
  firebase_app_check: ^0.3.0+1
  cloud_functions: ^5.0.1

  # WebView
  webview_flutter: ^4.8.0

  # Local Storage
  shared_preferences: ^2.2.3

  # UI/UX
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
